name: Daily Dispatch

on:
  schedule:
    # 22:00 UTC = 07:00 KST (next day) -> a 7am Seoul paper.
    - cron: "0 22 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: dispatch-repo        # shared with weekly to avoid push races
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build today's edition
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py
      - name: Commit the new edition
        run: |
          git config user.name  "daily-dispatch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit (quiet news day)."
            exit 0
          fi
          git commit -m "Edition $(date -u +%Y-%m-%d)"
          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && git push && exit 0
            echo "push attempt $i failed; retrying in 5s..."; sleep 5
          done
          echo "push failed after retries"; exit 1
