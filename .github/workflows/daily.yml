name: Daily Dispatch

on:
  schedule:
    # GitHub cron is UTC. 22:00 UTC = 07:00 KST (next day) -> a 7am Seoul paper.
    - cron: "0 22 * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab anytime

permissions:
  contents: write          # allow committing the new issue back to the repo

concurrency:
  group: daily-dispatch
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build today's edition
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python src/main.py

      - name: Commit the new edition
        run: |
          git config user.name  "daily-dispatch-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs editor_log config/sources.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit (quiet news day)."
          else
            git commit -m "Edition $(date -u +%Y-%m-%d)"
            git push
          fi
